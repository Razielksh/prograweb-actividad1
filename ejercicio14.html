<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/ejercicio14.js"></script>
    <link rel="stylesheet" href="css/ejercicio13.css">
    <title>Arreglos</title>
</head>

<body>
    <div class="contenedor">
        <div>
            <h1>Arreglos</h1>
        </div>
        <form class="formulario">
            <div class="grupo-formulario">
                <label>Ingrese la serie de numeros: </label>
                <input type="text" id="cadena" placeholder="Ej. 1,2,3" required>
            </div>

            <button class="boton-con" id="c" type="button" onclick="calcular()">Verificar</button>

            <div class="grupo-formulario">
                <label>Número mayor: </label>
                <input type="text" id="mayor" required readonly>
            </div>
            <div class="grupo-formulario">
                <label>Número menor: </label>
                <input type="text" id="menor" required readonly>
            </div>
            <div class="grupo-formulario">
                <label>Promedio: </label>
                <input type="text" id="promedio" required readonly>
            </div>
        </form>
    </div>
</body>
</html>
