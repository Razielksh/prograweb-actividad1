<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/ejercicio16.js" defer></script>
    <link rel="stylesheet" href="css/ejercicio16.css">
    <title>Calculadora</title>
</head>

<body>
    <div class="contenedor">
        <div>
            <h1>Calculadora</h1>
            <p class="subtitulo">Ingrese dos números y seleccione una operación</p>
        </div>
        <form class="formulario">
            <div class="grupo-formulario">
                <label>Número 1: </label>
                <input type="text" id="numero1" placeholder="Ej. 10" required>
            </div>

            <div class="grupo-formulario">
                <label>Número 2: </label>
                <input type="text" id="numero2" placeholder="Ej. 5" required>
            </div>

            <div class="grupo-botones">
                <button class="boton-con" type="button" onclick="calcularOperacion('suma')">Sumar</button>
                <button class="boton-con" type="button" onclick="calcularOperacion('resta')">Restar</button>
                <button class="boton-con" type="button" onclick="calcularOperacion('multiplicacion')">Multiplicar</button>
                <button class="boton-con" type="button" onclick="calcularOperacion('division')">Dividir</button>
            </div>

            <div class="grupo-formulario">
                <label>Resultado: </label>
                <input type="text" id="resultado" readonly>
            </div>
        </form>
    </div>
</body>
</html>
